# Aethelgard v2.5 — Fly.io Deployment Configuration
# Stateless FastAPI service with managed Redis

app = "aethelgard-api"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8000"
APP_HOST = "0.0.0.0"
APP_ENV = "production"
PYTHONUNBUFFERED = "1"
AETHELGARD_CORS_ORIGINS = "https://aethelgard-ui.fly.dev,https://aethelgard-api.fly.dev"

[[services]]
internal_port = 8000
protocol = "tcp"
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.http_checks]]
interval = "10s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/health"
protocol = "http"
