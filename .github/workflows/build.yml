name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────
  # STAGE 1 — Python Lint  (ruff check + format check)
  # ───────────────────────────────────────────────────────
  lint:
    name: "Lint · Python (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check agents/ core/ sandbox/ api.py main.py

      - name: Format check
        run: ruff format --check agents/ core/ sandbox/ api.py main.py

  # ───────────────────────────────────────────────────────
  # STAGE 2 — Frontend Build  (tsc typecheck + vite build)
  # ───────────────────────────────────────────────────────
  frontend-build:
    name: "Build · Frontend (tsc + vite)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  # ───────────────────────────────────────────────────────
  # STAGE 3 — Backend Import Check  (python -c import)
  # ───────────────────────────────────────────────────────
  backend-import:
    name: "Test · Backend import"
    runs-on: ubuntu-latest
    env:
      AETHELGARD_API_KEY: ci-test-key-aethelgard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports correctly
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('AETHELGARD_API_KEY', 'ci-test-key')
          # Verify core modules import without error
          from core.config import get_settings
          from core.models import PlatformMetrics
          from core.exceptions import AethelgardError
          print('Backend imports OK')
          "

  # ───────────────────────────────────────────────────────
  # Summary gate — all three stages must pass
  # ───────────────────────────────────────────────────────
  build-ok:
    name: "Build · Gate"
    runs-on: ubuntu-latest
    needs: [lint, frontend-build, backend-import]
    steps:
      - name: All quality gates passed
        run: |
          echo "lint         ✓"
          echo "frontend     ✓"
          echo "backend      ✓"
          echo "Commit ${{ github.sha }} cleared build gate."
