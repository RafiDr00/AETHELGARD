name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy"
        required: false
        default: "main"

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref_name || github.event.inputs.git_ref }}
  cancel-in-progress: false

jobs:
  deploy-gate:
    name: "Stage 1 · Deployment Gate"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      image_latest: ${{ steps.resolve.outputs.image_latest }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ github.event.inputs.git_ref }}
      - name: Resolve deploy target
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            DEPLOY_REF="${{ github.event.workflow_run.head_branch }}"
          else
            DEPLOY_SHA="$(git rev-parse HEAD)"
            DEPLOY_REF="${{ github.event.inputs.git_ref || github.ref_name }}"
          fi
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "deploy_sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${DEPLOY_REF}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${OWNER_LC}/aethelgard:${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=ghcr.io/${OWNER_LC}/aethelgard:latest" >> "$GITHUB_OUTPUT"
      - name: Deployment approved by gate
        run: |
          echo "Deploy ref: ${{ steps.resolve.outputs.deploy_ref }}"
          echo "Deploy sha: ${{ steps.resolve.outputs.deploy_sha }}"

  publish-image:
    name: "Stage 2 · Publish Image"
    runs-on: ubuntu-latest
    needs: [deploy-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.deploy-gate.outputs.deploy_sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.deploy-gate.outputs.image_ref }}
            ${{ needs.deploy-gate.outputs.image_latest }}

  deploy-staging:
    name: "Stage 3 · Deploy Staging"
    runs-on: ubuntu-latest
    needs: [deploy-gate, publish-image]
    environment: staging
    permissions:
      contents: read
    env:
      K8S_NAMESPACE_STAGING: ${{ vars.K8S_NAMESPACE_STAGING || 'aethelgard' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.deploy-gate.outputs.deploy_sha }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig (staging)
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_STAGING_B64 }}" ]; then
            echo "Missing required secret: KUBE_CONFIG_STAGING_B64"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING_B64 }}" | base64 --decode > ~/.kube/config
      - name: Apply manifests (staging)
        run: |
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl -n "$K8S_NAMESPACE_STAGING" apply -f infra/kubernetes/configmap.yaml
          kubectl -n "$K8S_NAMESPACE_STAGING" apply -f infra/kubernetes/service.yaml
          kubectl -n "$K8S_NAMESPACE_STAGING" apply -f infra/kubernetes/deployment.yaml
      - name: Set image and wait for rollout (staging)
        run: |
          kubectl -n "$K8S_NAMESPACE_STAGING" set image deployment/aethelgard-api \
            aethelgard-api=${{ needs.deploy-gate.outputs.image_ref }}
          kubectl -n "$K8S_NAMESPACE_STAGING" rollout status deployment/aethelgard-api --timeout=180s

  smoke-staging:
    name: "Stage 4 · Smoke Staging"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: staging
    steps:
      - name: Health check /health
        shell: bash
        run: |
          URL="${{ vars.STAGING_HEALTHCHECK_URL }}"
          if [ -z "$URL" ]; then
            echo "Missing required repo variable: STAGING_HEALTHCHECK_URL"
            exit 1
          fi
          curl -fsS "$URL"

  deploy-production:
    name: "Stage 5 · Deploy Production"
    runs-on: ubuntu-latest
    needs: [deploy-gate, smoke-staging]
    environment: production
    permissions:
      contents: read
    env:
      K8S_NAMESPACE_PRODUCTION: ${{ vars.K8S_NAMESPACE_PRODUCTION || 'aethelgard' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.deploy-gate.outputs.deploy_sha }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig (production)
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_PRODUCTION_B64 }}" ]; then
            echo "Missing required secret: KUBE_CONFIG_PRODUCTION_B64"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION_B64 }}" | base64 --decode > ~/.kube/config
      - name: Set image and wait for rollout (production)
        run: |
          kubectl -n "$K8S_NAMESPACE_PRODUCTION" set image deployment/aethelgard-api \
            aethelgard-api=${{ needs.deploy-gate.outputs.image_ref }}
          kubectl -n "$K8S_NAMESPACE_PRODUCTION" rollout status deployment/aethelgard-api --timeout=240s
      - name: Health check /health (production)
        shell: bash
        run: |
          URL="${{ vars.PRODUCTION_HEALTHCHECK_URL }}"
          if [ -z "$URL" ]; then
            echo "Missing required repo variable: PRODUCTION_HEALTHCHECK_URL"
            exit 1
          fi
          curl -fsS "$URL"
      - name: Rollback on failure
        if: failure()
        run: |
          kubectl -n "$K8S_NAMESPACE_PRODUCTION" rollout undo deployment/aethelgard-api || true
          kubectl -n "$K8S_NAMESPACE_PRODUCTION" rollout status deployment/aethelgard-api --timeout=180s || true
