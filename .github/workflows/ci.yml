name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install mypy

      - name: Ruff lint
        run: |
          python -m ruff check .

      - name: Static type checks
        run: |
          python -m mypy core/preflight.py sandbox/sandbox_executor.py api.py --ignore-missing-imports --follow-imports=skip

      - name: Security linting
        run: |
          python -m bandit -r agents core sandbox api.py -q

  tests:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests (includes metrics contract)
        run: |
          python -m pytest -q --tb=short --cov=agents --cov=core --cov=application --cov=infrastructure --cov=domain --cov-report=term-missing --cov-fail-under=70

  docker-runtime:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker runtime
        run: |
          docker version
          docker ps
          docker run --rm hello-world

  integration:
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          python -m pytest -q --tb=short -m integration tests/test_e2e_pipeline.py
        env:
          AETHELGARD_API_KEY: test-key-aethelgard

  sandbox-security:
    runs-on: ubuntu-latest
    needs: [tests, docker-runtime]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sandbox test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Enforce sandbox security policy
        run: |
          python -m pytest -q tests/test_sandbox_hardening.py

      - name: Verify sandbox security flags contract
        run: |
          python - <<'PY'
          from sandbox.sandbox_executor import SandboxExecutor

          ex = SandboxExecutor()
          assert ex._require_container is True
          print("SANDBOX_OK")
          PY

  build:
    runs-on: ubuntu-latest
    needs: [tests, docker-runtime, sandbox-security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -t aethelgard:test .

      - name: Run container image smoke check
        run: |
          docker run --rm --entrypoint python aethelgard:test --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  deploy-guard:
    runs-on: ubuntu-latest
    needs: [lint, tests, integration, docker-runtime, sandbox-security, build]

    steps:
      - name: Deployment guard
        run: |
          echo "All required stages passed. Deployment is unblocked."
