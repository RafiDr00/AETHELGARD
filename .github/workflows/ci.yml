name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — Lint  (ruff check + format check)
  # ─────────────────────────────────────────────
  lint:
    name: "Stage 1 · Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Lint check
        run: ruff check agents/ core/ sandbox/ api.py main.py
      - name: Format check
        run: ruff format --check agents/ core/ sandbox/ api.py main.py

  # ─────────────────────────────────────────────
  # STAGE 2 — Typecheck  (mypy on hardened modules)
  # ─────────────────────────────────────────────
  typecheck:
    name: "Stage 2 · Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps + mypy
        run: pip install -r requirements.txt mypy
      - name: mypy on hardened modules
        run: |
          python -m mypy \
            sandbox/sandbox_executor.py api.py \
            --ignore-missing-imports --follow-imports=skip

  # ─────────────────────────────────────────────
  # STAGE 3 — Security  (bandit SAST scan)
  # ─────────────────────────────────────────────
  security:
    name: "Stage 3 · Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install bandit
        run: pip install bandit
      - name: bandit scan
        run: python -m bandit -r agents/ core/ sandbox/ api.py -q

  # ─────────────────────────────────────────────
  # STAGE 4 — Tests  (pytest full suite)
  # ─────────────────────────────────────────────
  tests:
    name: "Stage 4 · Tests"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security]
    env:
      AETHELGARD_API_KEY: ci-test-key-aethelgard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest -q --tb=short

  # ─────────────────────────────────────────────
  # STAGE 5 — Docker Build  (image build + smoke)
  # ─────────────────────────────────────────────
  docker-build:
    name: "Stage 5 · Docker Build"
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t aethelgard:ci-${{ github.sha }} .
      - name: Python smoke check
        run: docker run --rm --entrypoint python aethelgard:ci-${{ github.sha }} --version

  # ─────────────────────────────────────────────
  # STAGE 6 — Container Runtime  (Docker daemon + isolation flags)
  # ─────────────────────────────────────────────
  container-runtime:
    name: "Stage 6 · Container Runtime"
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker daemon
        run: docker version && docker ps && docker run --rm hello-world
      - name: Validate sandbox isolation flags
        run: |
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 64 \
            --memory 256m \
            alpine echo SANDBOX_OK

  # ─────────────────────────────────────────────
  # STAGE 7 — Sandbox Security  (policy + contract tests)
  # ─────────────────────────────────────────────
  sandbox-security:
    name: "Stage 7 · Sandbox Security"
    runs-on: ubuntu-latest
    needs: [tests, container-runtime]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run sandbox hardening tests
        run: python -m pytest -q tests/test_sandbox_hardening.py -v
      - name: Assert _require_container contract
        run: |
          python - <<'PY'
          from sandbox.sandbox_executor import SandboxExecutor
          ex = SandboxExecutor()
          assert ex._require_container is True, "_require_container must be True in production"
          print("SANDBOX_CONTRACT_OK")
          PY

  # ─────────────────────────────────────────────
  # STAGE 8 — Pipeline Summary
  # ─────────────────────────────────────────────
  pipeline-summary:
    name: "Stage 8 · Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, tests, docker-build, container-runtime, sandbox-security]
    steps:
      - name: CI completed
        run: |
          echo "All CI quality gates passed."
          echo "Commit ${{ github.sha }} is eligible for CD." 
