networks:
  aethelgard:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}
  jaeger_data: {}

services:

  # ── Jaeger (Distributed Tracing)  ──────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: aethelgard-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC  ← Aethelgard sends traces here
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # Jaeger Thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger_data:/badger
    networks: [aethelgard]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus (Metrics Scraper) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: aethelgard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks: [aethelgard]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana (Dashboards) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: aethelgard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aethelgard
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/aethelgard.json:ro
    networks: [aethelgard]
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Alertmanager (Alert Routing) ────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aethelgard-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [aethelgard]
    restart: unless-stopped
