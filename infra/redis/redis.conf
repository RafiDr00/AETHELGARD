# Aethelgard v2 — Redis Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (for event replay)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Streams
stream-node-max-bytes 4096
stream-node-max-entries 100

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300
hz 10

# Logging
loglevel notice
