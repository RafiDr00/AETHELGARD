global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: aethelgard-dev
    env: development

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  - job_name: aethelgard-api
    metrics_path: /metrics/prometheus
    scrape_interval: 10s
    static_configs:
      - targets:
          - host.docker.internal:8000   # Aethelgard running on host
        labels:
          service: aethelgard-v2
          component: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: jaeger
    static_configs:
      - targets: ["jaeger:14269"]
