# Aethelgard v2 — Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: aethelgard-api
  namespace: aethelgard
  labels:
    app: aethelgard
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: aethelgard
    component: api

# Ingress (for external access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aethelgard-ingress
  namespace: aethelgard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aethelgard.internal
      secretName: aethelgard-tls
  rules:
    - host: aethelgard.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aethelgard-api
                port:
                  number: 80
