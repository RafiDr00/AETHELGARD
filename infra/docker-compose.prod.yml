# ============================================
# Aethelgard v2 — Production Docker Compose
# Usage:
#   docker compose -f infra/docker-compose.prod.yml up -d
# ============================================

x-common-env: &common-env
  APP_ENV: production
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  LOG_LEVEL: INFO

services:
  # ─────────────────────────────────────
  # API — Production
  # ─────────────────────────────────────
  aethelgard-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        BUILD_ENV: production
    image: aethelgard:${IMAGE_TAG:-latest}
    container_name: aethelgard-api-prod
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      AETHELGARD_API_KEY: ${AETHELGARD_API_KEY:?AETHELGARD_API_KEY must be set}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api-logs:/app/logs
      - api-data:/app/data
    networks:
      - aethelgard-net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────────────────────────────────
  # Redis — Production (with persistence)
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aethelgard-redis-prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aethelgard-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────
  # Sandbox Runner — Production
  # ─────────────────────────────────────
  sandbox:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
    container_name: aethelgard-sandbox-prod
    networks:
      - aethelgard-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────
  # Prometheus — Production
  # ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aethelgard-prometheus-prod
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - aethelgard-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────
  # Grafana — Production
  # ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: aethelgard-grafana-prod
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/aethelgard.json:ro
    networks:
      - aethelgard-net
    depends_on:
      - prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  aethelgard-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  api-logs:
    driver: local
  api-data:
    driver: local
