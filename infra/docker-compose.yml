# ============================================
# Aethelgard v2 — Docker Compose
# Complete platform infrastructure
# ============================================

version: "3.9"

services:
  # ─────────────────────────────────────
  # Core Platform
  # ─────────────────────────────────────
  aethelgard-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: aethelgard-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - aethelgard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────
  # Dashboard
  # ─────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: aethelgard-dashboard
    command: streamlit run dashboard/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - aethelgard-api
    networks:
      - aethelgard-net
    restart: unless-stopped

  # ─────────────────────────────────────
  # Redis (Event Bus)
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aethelgard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - aethelgard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────
  # Sandbox Runner
  # ─────────────────────────────────────
  sandbox:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
    container_name: aethelgard-sandbox
    networks:
      - aethelgard-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─────────────────────────────────────
  # Monitoring (Optional)
  # ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aethelgard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    networks:
      - aethelgard-net
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: aethelgard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=aethelgard
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - aethelgard-net
    restart: unless-stopped
    profiles:
      - monitoring

# ─────────────────────────────────────
# Volumes
# ─────────────────────────────────────
volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ─────────────────────────────────────
# Networks
# ─────────────────────────────────────
networks:
  aethelgard-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
