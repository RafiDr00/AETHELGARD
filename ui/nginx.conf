server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index ops_console.html;

    location / {
        try_files $uri $uri/ /ops_console.html;
    }

    location /modules/ {
        try_files $uri =404;
    }

    location ~* \.(js|css|html|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
