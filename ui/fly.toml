app = "aethelgard-ui"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  API_URL = "https://aethelgard-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
